<section class="login-page">
  <div class="login-card">
    <p class="login-eyebrow">Acceso privado</p>
    <h1>Iniciar sesión</h1>
    <p class="login-description">
      Introduce tus credenciales para acceder al portfolio.
    </p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="prueba@prueba.com"
        />
        @if (f.email?.touched && f.email?.invalid) {
          <small class="error">Introduce un email válido</small>
        }
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
        />
        @if (f.password?.touched && f.password?.invalid) {
          <small class="error">La contraseña es obligatoria</small>
        }
      </div>

      <button type="submit" [disabled]="loginForm.invalid">
        Entrar
      </button>
    </form>

    @if (error) {
      <p class="error global-error">{{ error }}</p>
    }
  </div>
</section>
